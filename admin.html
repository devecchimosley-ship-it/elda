<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMS Admin - Crea Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #1e1b4b, #4c1d95); color: white; padding: 2rem; }
    .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 2rem; margin: 2rem auto; max-width: 900px; }
    input, textarea, select { width: 100%; padding: 1rem; margin: 1rem 0; border-radius: 12px; border: none; font-size: 1.1rem; }
    .btn { padding: 1rem 2rem; background: #8b5cf6; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
    .quiz-list { margin-top: 3rem; }
    .quiz-item { background: rgba(255,255,255,0.2); padding: 1rem; border-radius: 12px; margin: 1rem 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin EMS - Crea Quiz</h1>
    <p>Email: <strong>admin@ems.it</strong> | Password: <strong>EmsQuiz2025!</strong></p>
    
    <input type="text" id="title" placeholder="Titolo quiz (es. Quiz Natale 2025)" />
    <textarea id="question" rows="3" placeholder="Domanda"></textarea>
    <div id="answers">
      <input type="text" placeholder="Risposta 1 (corretta)" class="answer" />
      <input type="text" placeholder="Risposta 2" class="answer" />
      <input type="text" placeholder="Risposta 3" class="answer" />
      <input type="text" placeholder="Risposta 4" class="answer" />
    </div>
    <button class="btn" onclick="addQuiz()">Aggiungi Quiz</button>
    <button class="btn" style="background:#10b981;" onclick="publishAll()">Pubblica Tutti</button>

    <div class="quiz-list">
      <h2>I tuoi quiz (<span id="count">0</span>)</h2>
      <div id="quizList"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyCjBRJritJMO_yQu5JzO7yHTkcRyMIn51w",
      authDomain: "eldaquiz-cfc72.firebaseapp.com",
      projectId: "eldaquiz-cfc72",
      storageBucket: "eldaquiz-cfc72.firebasestorage.app",
      messagingSenderId: "805402501775",
      appId: "1:805402501775:web:19f583ac4db621c40886fa"
    });
    const db = getFirestore(app);

    window.addQuiz = async () => {
      const title = document.getElementById('title').value;
      const question = document.getElementById('question').value;
      const answers = Array.from(document.querySelectorAll('.answer')).map(a => a.value);

      if (!title || !question || answers.some(a => !a)) return alert("Compila tutto!");

      await addDoc(collection(db, "drafts"), { title, question, answers, correct: 0, created: Date.now() });
      loadDrafts();
    };

    window.publishAll = async () => {
      const snaps = await getDocs(collection(db, "drafts"));
      for (let s of snaps.docs) {
        await addDoc(collection(db, "live_quizzes"), s.data());
        await deleteDoc(doc(db, "drafts", s.id));
      }
      alert("Tutti i quiz pubblicati!");
      loadDrafts();
    };

    async function loadDrafts() {
      const snaps = await getDocs(collection(db, "drafts"));
      document.getElementById('count').textContent = snaps.size;
      document.getElementById('quizList').innerHTML = snaps.docs.map(d => {
        const data = d.data();
        return `<div class="quiz-item">
          <strong>${data.title}</strong><br>${data.question}<br>
          ${data.answers.map((a,i) => `<small>${i+1}. ${a}</small>`).join(' | ')}
        </div>`;
      }).join('');
    }
    loadDrafts();
  </script>
</body>
</html>
