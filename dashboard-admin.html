<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin — Live Quiz</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a2e0a6c6f3.js" crossorigin="anonymous"></script>
</head>

<body data-theme="violet">
  <!-- Navbar -->
  <header class="navbar glass sticky">
    <div class="nav-left">
      <img src="assets/logo.png" alt="Logo EMS" class="nav-logo" />
      <span class="nav-title">Dashboard <strong>Admin</strong></span>
    </div>
    <nav class="nav-right">
      <button id="themeToggle" class="icon-btn"><i class="fas fa-adjust"></i></button>
      <button id="logoutAdmin" class="btn ghost"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </nav>
  </header>

  <!-- Contenuto principale -->
  <main class="main-container fade-in">
    <!-- Gestione Presentatori -->
    <section class="card shadow">
      <h2><i class="fas fa-users-cog"></i> Gestione Presentatori</h2>
      <p class="muted">Crea e gestisci gli account dei presentatori.</p>

      <div class="form-grid">
        <input id="presenterEmail" type="email" placeholder="Email presentatore" class="input" />
        <input id="presenterPassword" type="password" placeholder="Password temporanea" class="input" />
        <button id="createPresenter" class="btn primary"><i class="fas fa-plus"></i> Crea Presentatore</button>
      </div>

      <div id="presenterList" class="list-box modern-list"></div>
    </section>

    <!-- Gestione Quiz e Sondaggi -->
    <section class="card shadow">
      <h2><i class="fas fa-poll-h"></i> Gestione Quiz e Sondaggi</h2>
      <p class="muted">Visualizza, modifica o elimina contenuti salvati.</p>

      <div class="btn-row wrap">
        <button id="createQuizBtn" class="btn good"><i class="fas fa-plus-circle"></i> Nuovo Quiz</button>
        <button id="createSurveyBtn" class="btn good"><i class="fas fa-chart-pie"></i> Nuovo Sondaggio</button>
        <button id="refreshList" class="btn ghost"><i class="fas fa-sync"></i> Aggiorna</button>
      </div>

      <div id="contentList" class="list-box modern-list mt-2"></div>
    </section>

    <!-- Impostazioni generali -->
    <section class="card shadow">
      <h2><i class="fas fa-cogs"></i> Impostazioni generali</h2>
      <div class="btn-row wrap">
        <button id="backupData" class="btn ghost"><i class="fas fa-database"></i> Backup dati</button>
        <button id="deleteAll" class="btn danger"><i class="fas fa-trash-alt"></i> Cancella tutto</button>
      </div>
      <div id="adminMsg" class="muted mt-2"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer glass">
    <p>© 2025 Associazione Elda Marzocchi Scarzella — Live Quiz</p>
  </footer>

  <!-- Script -->
  <script src="js/firebase.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
