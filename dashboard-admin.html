<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin — Live Quiz</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-theme="violet">
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo.png" alt="Logo EMS" class="logo" />
      <div>
        <h1>Dashboard Admin</h1>
        <p class="brand-sub">Gestione Presentatori · Quiz · Sondaggi</p>
      </div>
    </div>
    <div class="header-right">
      <button id="logoutAdmin" class="btn ghost">Logout</button>
    </div>
  </header>

  <main class="main-wrap">
    <section class="card">
      <h2>Gestione Presentatori</h2>
      <p class="muted">Crea e gestisci gli account dei presentatori.</p>
      <div class="form-group">
        <input id="presenterEmail" type="email" placeholder="Email presentatore" class="input" />
        <input id="presenterPassword" type="password" placeholder="Password temporanea" class="input" />
        <button id="createPresenter" class="btn primary">Crea Presentatore</button>
      </div>
      <div id="presenterList" class="list-box"></div>
    </section>

    <section class="card">
      <h2>Gestione Quiz e Sondaggi</h2>
      <p class="muted">Visualizza, modifica o elimina contenuti già salvati.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button id="createQuizBtn" class="btn good">+ Crea nuovo Quiz</button>
        <button id="createSurveyBtn" class="btn good">+ Crea nuovo Sondaggio</button>
        <button id="refreshList" class="btn ghost">🔄 Aggiorna elenco</button>
      </div>
      <div id="contentList" class="list-box" style="margin-top:12px;"></div>
    </section>

    <section class="card">
      <h2>Impostazioni generali</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button id="backupData" class="btn ghost">💾 Backup dati</button>
        <button id="deleteAll" class="btn danger">❌ Cancella tutto</button>
      </div>
      <div id="adminMsg" class="muted" style="margin-top:8px;"></div>
    </section>
  </main>

  <footer class="footer muted">
    <p>© 2025 Associazione Elda Marzocchi Scarzella — Live Quiz</p>
  </footer>

  <script src="js/firebase.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
