<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Quiz — Associazione Elda Marzocchi Scarzella</title>
  <meta name="description" content="Quiz e sondaggi live per l'Associazione Elda Marzocchi Scarzella" />
  <meta name="theme-color" content="#7c3aed" />

  <!-- Favicon -->
  <link rel="icon" href="assets/logo.png" />

  <!-- CSS principale -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-theme="violet">
  <header class="app-header">
    <div class="header-left">
      <img src="assets/logo.png" alt="Logo EMS" class="logo" />
      <div>
        <h1>Live Quiz — <span class="highlight">Associazione Elda Marzocchi Scarzella</span></h1>
        <p class="brand-sub">Quiz · Sondaggi · Admin / Presentatore / Partecipante</p>
      </div>
    </div>
    <div class="theme-buttons" id="themeButtons"></div>
  </header>

  <!-- Sezione di benvenuto -->
  <main class="main-card fade show" id="welcome">
    <h2 class="welcome-title">🎉 Benvenuti al Live Quiz!</h2>
    <p class="welcome-sub">Gioca, vota e divertiti insieme a noi ✨</p>
    <button id="openProfileSelector" class="btn primary">Seleziona profilo</button>
  </main>

  <!-- Popup Selettore profilo -->
  <div id="profilePopup" class="popup hidden">
    <div class="popup-content">
      <h3>Scegli il tuo profilo</h3>
      <div class="popup-options">
        <button id="profileAdmin" class="btn ghost">👑 Admin</button>
        <button id="profilePresenter" class="btn ghost">🎤 Presentatore</button>
        <button id="profilePlayer" class="btn ghost">🎮 Partecipante</button>
      </div>
      <button id="closePopup" class="btn danger">Chiudi</button>
    </div>
  </div>

  <!-- Script principali -->
   <!-- ===============================
       🔗 SCRIPT DEL SITO (modulari)
       =============================== -->

  <!-- Inizializza Firebase e il core -->
  <script type="module" src="js/firebase.js"></script>

  <!-- Gestione accessi, login, ruoli -->
  <script type="module" src="js/app.js"></script>

  <!-- Gestione quiz e sondaggi -->
  <script type="module" src="js/quiz.js"></script>

  <!-- Grafico live risultati -->
  <script type="module" src="js/chart.js"></script>

  <!-- Interfaccia, temi e animazioni -->
  <script type="module" src="js/ui.js"></script>

  <!-- Suoni e feedback -->
  <script type="module" src="js/sound.js"></script>

</body>
</html>
