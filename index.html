<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Quiz — Associazione Elda Marzocchi Scarzella</title>
  <meta name="description" content="Quiz e sondaggi live per l'Associazione Elda Marzocchi Scarzella" />
  <meta name="theme-color" content="#7c3aed" />

  <!-- Favicon -->
  <link rel="icon" href="assets/logo.png" />

  <!-- CSS principale -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Google Fonts + icone -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a2e0a6c6f3.js" crossorigin="anonymous"></script>
</head>

<body data-theme="violet">
  <!-- Navbar -->
  <header class="navbar glass sticky">
    <div class="nav-left">
      <img src="assets/logo.png" alt="Logo EMS" class="nav-logo" />
      <span class="nav-title">Live Quiz — <strong>Associazione EMS</strong></span>
    </div>
    <nav class="nav-right">
      <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
    </nav>
  </header>

  <!-- Hero principale -->
  <main class="hero fade-in">
    <div class="hero-content">
      <h1>🎉 Benvenuti al <span class="accent">Live Quiz!</span></h1>
      <p class="subtitle">Gioca, vota e divertiti insieme a noi ✨</p>
      <button id="openProfileSelector" class="btn primary pulse">Inizia ora</button>
    </div>
  </main>

  <!-- Popup selezione profilo -->
  <div id="profilePopup" class="modal hidden">
    <div class="modal-card slide-up">
      <button id="closePopup" class="close-btn">&times;</button>
      <h2>👤 Seleziona il tuo profilo</h2>
      <div class="profile-options">
        <button id="profileAdmin" class="btn ghost">👑 Admin</button>
        <button id="profilePresenter" class="btn ghost">🎤 Presentatore</button>
        <button id="profilePlayer" class="btn ghost">🎮 Partecipante</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer glass">
    <p>© 2025 Associazione Elda Marzocchi Scarzella — Tutti i diritti riservati</p>
  </footer>

  <!-- Script -->
<!-- Script principali (moduli ES6) -->
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/quiz.js"></script>

<!-- Script classico (senza import/export) -->
<script src="js/ui.js"></script>

</body>
</html>
