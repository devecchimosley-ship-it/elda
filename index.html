<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMS Kahoot 2025 - Gioca Ora!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#1e1b4b,#4c1d95,#7c3aed); color:#fff; height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; }
    .box { background:rgba(255,255,255,0.15); backdrop-filter:blur(20px); padding:3rem; border-radius:30px; max-width:500px; width:90%; box-shadow:0 20px 50px rgba(0,0,0,0.5); }
    h1 { font-family:'Fredoka One',cursive; font-size:4rem; background:linear-gradient(45deg,#c084fc,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    input { width:100%; padding:1.5rem; margin:1.5rem 0; border:none; border-radius:20px; font-size:1.5rem; text-align:center; }
    .btn { padding:2rem 4rem; background:#8b5cf6; border:none; border-radius:25px; color:white; font-size:2rem; cursor:pointer; box-shadow:0 15px 40px rgba(139,92,246,0.6); }
    .btn:hover { transform:scale(1.1); }
    .logo { width:150px; border-radius:50%; margin-bottom:1rem; }
  </style>
</head>
<body>
  <div class="box">
    <img src="https://eldaquiz-cfc72.web.app/assets/logo.png" class="logo" alt="EMS" />
    <h1>EMS KAHOOT 2025</h1>
    <p style="font-size:1.5rem;">Inserisci il PIN del presentatore</p>
    <input type="text" id="pin" placeholder="483920" maxlength="6" />
    <input type="text" id="nick" placeholder="Il tuo nome" />
    <button class="btn" onclick="join()">ENTRA NEL GIOCO!</button>
  </div>

  <script type="module">
    const urlParams = new URLSearchParams(location.search);
    if (urlParams.has('join')) {
      document.getElementById('pin').value = urlParams.get('join');
    }

    window.join = () => {
      const pin = document.getElementById('pin').value;
      const nick = document.getElementById('nick').value || "Giocatore";
      if (pin.length !== 6) return alert("PIN non valido!");
      location.href = `player.html?pin=${pin}&nick=${encodeURIComponent(nick)}`;
    };

    document.addEventListener('keypress', e => { if (e.key === 'Enter') join(); });
  </script>
</body>
</html>
