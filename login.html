<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin — Live Quiz</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="center-screen" data-theme="violet">
  <div class="card shadow" style="max-width:400px;">
    <h2>👑 Accesso Admin</h2>
    <input id="adminEmail" type="email" placeholder="Email" class="input" />
    <input id="adminPassword" type="password" placeholder="Password" class="input" />
    <button id="loginBtn" class="btn primary">Accedi</button>
    <p id="loginMsg" class="muted"></p>
  </div>

  <script type="module">
    import { adminLogin } from "./js/firebase.js";

    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("adminEmail").value;
      const password = document.getElementById("adminPassword").value;
      const msg = document.getElementById("loginMsg");

      try {
        await adminLogin(email, password);
        msg.textContent = "✅ Accesso effettuato!";
        window.location.href = "dashboard-admin.html";
      } catch (err) {
        msg.textContent = "❌ Credenziali errate.";
      }
    };
  </script>
</body>
</html>
