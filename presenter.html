<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentatore EMS</title>
  <style>
    body { font-family:'Poppins',sans-serif; background:#1e1b4b; color:white; text-align:center; padding:2rem; }
    .pin { font-size:6rem; background:black; padding:2rem; border-radius:30px; margin:3rem; }
    .btn { padding:2rem 6rem; font-size:3rem; background:#8b5cf6; border:none; border-radius:30px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>Presentatore EMS</h1>
  <p>Scegli un quiz pubblicato</p>
  <select id="quizSelect" style="padding:1.5rem;font-size:2rem;width:80%;border-radius:20px;"></select>
  <button class="btn" onclick="launch()">LANCIA</button>
  <div class="pin hidden" id="pinDisplay">483920</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, setDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const app = initializeApp({ /* stessa config */ });
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, user => {
      if (!user || !user.email.includes('ems.it')) {
        alert("Accesso negato!");
        window.location.href = "login.html";
      }
    });

    // Carica quiz pubblicati + lancia PIN
  </script>
</body>
</html>
