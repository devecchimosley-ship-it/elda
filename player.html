<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Partecipante — Elda Marzocchi Scarzella</title>
  <link rel="icon" href="assets/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-theme="violet">
  <div class="wrap">
    <header>
      <img src="assets/logo.png" alt="Logo" class="logo">
      <h1>🎮 Modalità Partecipante</h1>
    </header>

    <main class="card fade show">
      <p class="brand-sub">Attendi una domanda dal presentatore e rispondi in tempo reale.</p>

      <div id="currentQuestion" style="margin-top:16px;font-weight:700;"></div>
      <div id="playerAnswers" style="margin-top:8px;"></div>
      <div id="playerMsg" class="brand-sub" style="margin-top:10px;"></div>

      <button id="backPlayer" class="btn ghost" style="margin-top:14px;">🔙 Torna alla Home</button>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/quiz.js"></script>
  <script type="module" src="js/chart.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/sound.js"></script>

  <script>
  // collegamento "Indietro"
  document.getElementById("backPlayer").onclick = () => {
    window.location.href = "index.html";
  };

  // sincronizza le domande dal presentatore
  setInterval(() => {
    const data = localStorage.getItem("currentQuestion");
    if (!data) return;
    const { q, answers } = JSON.parse(data);
    const qBox = document.getElementById("currentQuestion");
    const aBox = document.getElementById("playerAnswers");
    qBox.textContent = q;
    aBox.innerHTML = "";
    answers.forEach(a => {
      const div = document.createElement("button");
      div.className = "btn ghost";
      div.textContent = a.text;
      div.onclick = () => {
        document.getElementById("playerMsg").textContent = "Risposta inviata ✅";
      };
      aBox.appendChild(div);
    });
  }, 2000);
  </script>
</body>
</html>
