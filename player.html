<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Quiz — Partecipante</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a2e0a6c6f3.js" crossorigin="anonymous"></script>
</head>

<body data-theme="violet">
  <!-- Navbar -->
  <header class="navbar glass sticky">
    <div class="nav-left">
      <img src="assets/logo.png" alt="Logo EMS" class="nav-logo" />
      <span class="nav-title">Live Quiz — <strong>Partecipante</strong></span>
    </div>
    <nav class="nav-right">
      <button id="themeToggle" class="icon-btn"><i class="fas fa-adjust"></i></button>
    </nav>
  </header>

  <!-- Contenuto -->
  <main class="main-container fade-in" id="playerMain">
    <section class="card shadow" id="waitingSection">
      <h2>⏳ In attesa di un quiz live...</h2>
      <p class="muted">Rimani connesso, il presentatore avvierà il quiz a breve.</p>
      <div class="loader"></div>
    </section>

    <section class="card shadow hidden" id="quizSection">
      <h2 id="quizTitle">Titolo Quiz</h2>
      <p id="quizQuestion" class="muted"></p>

      <div id="answersContainer" class="answers-grid"></div>

      <p id="timerDisplay" class="timer-display">⏱️ 0 s</p>
    </section>

    <section class="card shadow hidden" id="thanksSection">
      <h2>🎉 Risposta inviata!</h2>
      <p class="muted">Grazie per aver partecipato al quiz.</p>
    </section>
  </main>

  <footer class="footer glass">
    <p>© 2025 Associazione Elda Marzocchi Scarzella — Live Quiz</p>
  </footer>

  <script type="module" src="js/player.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
